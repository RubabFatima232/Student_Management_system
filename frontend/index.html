<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Record Management System</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="header-icon">🎓</span>
        <div>
          <h1>Student Record Management</h1>
          <p>Full CRUD Web Application</p>
        </div>
      </div>
      <button class="btn btn-primary" id="openAddModal">+ Add Student</button>
    </div>
  </header>

  <!-- ── Toast Notification ─────────────────────────────── -->
  <div id="toast" class="toast hidden"></div>

  <!-- ── Main Content ───────────────────────────────────── -->
  <main class="container">

    <!-- Stats Cards -->
    <section class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Students</div></div>
      <div class="stat-card green"><div class="stat-num" id="statCS">0</div><div class="stat-label">Computer Science</div></div>
      <div class="stat-card blue"><div class="stat-num" id="statA">0</div><div class="stat-label">Grade A / A+</div></div>
      <div class="stat-card orange"><div class="stat-num" id="statDepts">0</div><div class="stat-label">Departments</div></div>
    </section>

    <!-- Filter Bar -->
    <section class="filter-bar">
      <input type="text" id="searchInput" placeholder="🔍  Search by name or email…" class="input" />
      <select id="deptFilter" class="input">
        <option value="">All Departments</option>
        <option>Computer Science</option>
        <option>Mathematics</option>
        <option>Physics</option>
        <option>Chemistry</option>
        <option>Biology</option>
        <option>Engineering</option>
      </select>
      <button class="btn btn-outline" id="clearFilters">Clear</button>
    </section>

    <!-- Table -->
    <section class="table-wrapper">
      <div class="table-header">
        <h2>Student Records</h2>
        <span class="badge" id="resultCount">0 records</span>
      </div>
      <div id="tableBody">
        <div class="loading">Loading students…</div>
      </div>
    </section>
  </main>

  <!-- ── Add / Edit Modal ──────────────────────────────── -->
  <div id="formModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add New Student</h3>
        <button class="modal-close" id="closeModal">×</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="studentId"/>

        <div class="form-row">
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="fName" class="input" placeholder="e.g. Ali Raza"/>
          </div>
          <div class="form-group">
            <label>Email Address *</label>
            <input type="email" id="fEmail" class="input" placeholder="e.g. ali@uni.edu"/>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Department *</label>
            <select id="fDept" class="input">
              <option value="">Select department…</option>
              <option>Computer Science</option>
              <option>Mathematics</option>
              <option>Physics</option>
              <option>Chemistry</option>
              <option>Biology</option>
              <option>Engineering</option>
            </select>
          </div>
          <div class="form-group">
            <label>Grade *</label>
            <select id="fGrade" class="input">
              <option value="">Select grade…</option>
              <option>A+</option><option>A</option><option>A-</option>
              <option>B+</option><option>B</option><option>B-</option>
              <option>C+</option><option>C</option><option>C-</option>
              <option>D</option><option>F</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" id="fPhone" class="input" placeholder="e.g. 0301-1234567 (optional)"/>
        </div>

        <div id="formError" class="form-error hidden"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="cancelModal">Cancel</button>
        <button class="btn btn-primary" id="saveBtn">Save Student</button>
      </div>
    </div>
  </div>

  <!-- ── Delete Confirm Modal ───────────────────────────── -->
  <div id="deleteModal" class="modal-overlay hidden">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>Confirm Delete</h3>
        <button class="modal-close" id="closeDeleteModal">×</button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete <strong id="deleteStudentName"></strong>? This cannot be undone.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="cancelDelete">Cancel</button>
        <button class="btn btn-danger" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
